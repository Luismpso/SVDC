<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>D3 Tutorial 2 - Versão Simplificada</title>
    <style>
        #area-section { display: none; }
        #menu-container { margin-bottom: 20px; padding: 10px; background-color: #f0f0f0; }
        .bar { fill: steelblue; }
        .area { fill: lightblue; opacity: 0.6; }
        .line { fill: none; stroke: steelblue; stroke-width: 2; }
    </style>
</head>
<body>

    <div id="menu-container">
        <label for="grafico-menu"><strong>Escolhe o Gráfico: </strong></label>
        <select id="grafico-menu">
            <option value="barras">Gráfico de Barras</option>
            <option value="linha">Gráfico de Área</option>
        </select>
    </div>

    <div id="bar-section">
        <h2>Gráfico de Barras</h2>
        <div id="chart"></div>
    </div>

    <div id="area-section">
        <h2>Gráfico de Área</h2>
        <div id="area-chart"></div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="main.js"></script>

</body>
</html>
